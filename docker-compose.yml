version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: vm_portal_db
    restart: always
    environment:
      POSTGRES_DB: vm_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: