<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VM 배포</title>
    <link rel="stylesheet" href="./css.css">
    <!-- Pretendard -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
<style>* {
    box-sizing: border-box;
}

:root {
    --bg: #f7f7fb;
    --card: rgba(255, 255, 255, 0.78);
    --card-strong: rgba(255, 255, 255, 0.92);
    --border: rgba(25, 25, 35, 0.08);
    --text: #17171c;
    --subtext: #6f7280;
    --primary: #5b21d0;
    --primary-hover: #4c1bb0;
    --shadow: 0 20px 60px rgba(31, 38, 135, 0.08);
    --radius-xl: 28px;
    --radius-lg: 18px;
    --radius-md: 14px;
}

body {
    margin: 0;
    font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
    color: var(--text);
    background:
            radial-gradient(circle at 20% 25%, rgba(110, 219, 255, 0.35), transparent 24%),
            radial-gradient(circle at 72% 78%, rgba(255, 110, 160, 0.28), transparent 24%),
            radial-gradient(circle at 50% 12%, rgba(210, 160, 255, 0.22), transparent 18%),
            linear-gradient(180deg, #fcfcfe 0%, #f5f6fb 100%);
    min-height: 100vh;
}

.page {
    min-height: 100vh;
    padding: 28px;
}

.topbar {
    max-width: 1280px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 4px;
}

.brand {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.03em;
}

.status-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    color: var(--subtext);
    font-size: 14px;
    font-weight: 600;
}

.status-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #6b4eff;
    box-shadow: 0 0 0 6px rgba(107, 78, 255, 0.12);
}

.layout {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 440px 1fr;
    gap: 24px;
    align-items: start;
}

.panel {
    background: var(--card);
    border: 1px solid rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
    border-radius: var(--radius-xl);
}

.form-panel {
    padding: 28px;
}

.title-area {
    margin-bottom: 24px;
}

.eyebrow {
    display: inline-block;
    margin-bottom: 10px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(91, 33, 208, 0.08);
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
}

.title-area h1 {
    margin: 0;
    font-size: 34px;
    line-height: 1.15;
    letter-spacing: -0.04em;
    font-weight: 800;
}

.title-area p {
    margin: 12px 0 0;
    color: var(--subtext);
    font-size: 15px;
    line-height: 1.65;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 14px;
}

.field {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.field.full {
    grid-column: 1 / -1;
}

.field label {
    font-size: 14px;
    font-weight: 700;
    color: #2a2d38;
    letter-spacing: -0.01em;
}

.field input,
.field select {
    width: 100%;
    height: 50px;
    padding: 0 15px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.88);
    outline: none;
    font-size: 14px;
    color: var(--text);
    transition: 0.2s ease;
}

.field input::placeholder {
    color: #a1a5b3;
}

.field input:focus,
.field select:focus {
    border-color: rgba(91, 33, 208, 0.35);
    box-shadow: 0 0 0 4px rgba(91, 33, 208, 0.08);
    background: #fff;
}

.button-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
}

.btn {
    height: 52px;
    border: none;
    border-radius: 16px;
    padding: 0 20px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s ease;
}

.btn-primary {
    flex: 1;
    background: var(--primary);
    color: #fff;
    box-shadow: 0 12px 30px rgba(91, 33, 208, 0.24);
}

.btn-primary:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
}

.btn-secondary {
    flex: 1;
    background: rgba(255,255,255,0.9);
    color: var(--text);
    border: 1px solid var(--border);
}

.btn-secondary:hover {
    background: #fff;
    transform: translateY(-1px);
}

.right-column {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.viewer-panel {
    padding: 22px;
}

.section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
}

.section-title {
    margin: 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
}

.section-desc {
    color: var(--subtext);
    font-size: 13px;
    font-weight: 600;
}

.result-box {
    min-height: 230px;
    margin: 0;
    padding: 18px;
    background: rgba(249, 250, 252, 0.95);
    border: 1px solid rgba(20, 20, 30, 0.06);
    border-radius: 18px;
    color: #252833;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    overflow: auto;
}

.frame-wrap {
    overflow: hidden;
    border-radius: 20px;
    border: 1px solid rgba(20, 20, 30, 0.08);
    background: var(--card-strong);
    min-height: 720px;
}

iframe {
    display: block;
    width: 100%;
    height: 720px;
    border: none;
    background: white;
}

.empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 720px;
    color: var(--subtext);
    font-size: 15px;
    font-weight: 600;
    background:
            radial-gradient(circle at 25% 20%, rgba(110, 219, 255, 0.12), transparent 24%),
            radial-gradient(circle at 80% 80%, rgba(255, 110, 160, 0.12), transparent 22%),
            linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,249,252,0.96));
}

@media (max-width: 1100px) {
    .layout {
        grid-template-columns: 1fr;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 640px) {
    .page {
        padding: 16px;
    }

    .form-panel,
    .viewer-panel {
        padding: 18px;
    }

    .title-area h1 {
        font-size: 28px;
    }

    .button-row {
        flex-direction: column;
    }

    iframe,
    .empty-state,
    .frame-wrap {
        min-height: 520px;
        height: 520px;
    }
}</style>
</head>
<body>
<div class="page">
    <div class="topbar">
        <div class="brand">SSVM Center</div>
        <div class="status-chip">
            <span class="status-dot"></span>
            VM Provisioning Portal
        </div>
    </div>

    <div class="layout">
        <section class="panel form-panel">
            <div class="title-area">
                <span class="eyebrow">vCenter · Guacamole</span>
                <h2>가상머신 배포 & 원격 화면 연결</h2>
                <p>
                    가상머신 배포 설정을 입력한 뒤 vCenter에 생성된 결과를 확인하고,
                    원격 콘솔 화면까지 한 번에 연결할 수 있습니다.
                </p>
            </div>

            <div class="form-grid">
                <div class="field full">
                    <label for="vmName">VM 이름</label>
                    <input type="text" id="vmName" placeholder="가상머신 이름을 입력해주세요.">
                </div>

                <div class="field">
                    <label for="osType">OS 타입</label>
                    <select id="osType">
                        <option value="linux" selected>linux</option>
                        <option value="windows">windows</option>
                    </select>
                </div>

                <div class="field">
                    <label for="templateName">템플릿 이름</label>
                    <input type="text" id="templateName" value="rocky-template">
                </div>

                <div class="field">
                    <label for="cpu">CPU</label>
                    <input type="number" id="cpu" value="2">
                </div>

                <div class="field">
                    <label for="memoryMb">메모리(MB)</label>
                    <input type="number" id="memoryMb" value="4096">
                </div>

                <div class="field full">
                    <label for="networkName">네트워크</label>
                    <input type="text" id="networkName" value="VM Network">
                </div>

                <div class="field full">
                    <label for="hostName">호스트명</label>
                    <input type="text" id="hostName" value="rocky-custom">
                </div>

                <div class="field">
                    <label for="ipAddress">IP 주소</label>
                    <input type="text" id="ipAddress" placeholder="172.30.10.50">
                </div>

                <div class="field">
                    <label for="subnetMask">서브넷 마스크</label>
                    <input type="text" id="subnetMask" placeholder="255.255.255.0">
                </div>

                <div class="field">
                    <label for="gateway">게이트웨이</label>
                    <input type="text" id="gateway" placeholder="172.30.10.1">
                </div>

                <div class="field">
                    <label for="dnsServer">DNS</label>
                    <input type="text" id="dnsServer" placeholder="172.30.10.77">
                </div>

                <div class="field full">
                    <label for="powerOn">전원 켜기</label>
                    <select id="powerOn">
                        <option value="true" selected>true</option>
                        <option value="false">false</option>
                    </select>
                </div>
            </div>

            <div class="button-row">
                <button class="btn btn-primary" type="button" onclick="deployVm()">배포하기</button>
                <button class="btn btn-secondary" type="button" onclick="openRemoteConsole()">원격 화면 열기</button>
            </div>
        </section>

        <div class="right-column">
            <section class="panel viewer-panel">
                <div class="section-head">
                    <h3 class="section-title">결과</h3>
                    <span class="section-desc">API 응답 미리보기</span>
                </div>
                <pre id="result" class="result-box">아직 실행된 작업이 없습니다.</pre>
            </section>

            <section class="panel viewer-panel">
                <div class="section-head">
                    <h3 class="section-title">원격 화면</h3>
                    <span class="section-desc">Guacamole Console</span>
                </div>
                <div class="frame-wrap" id="frameWrap">
                    <div class="empty-state" id="emptyState">
                        아직 연결된 원격 화면이 없습니다.
                    </div>
                    <iframe id="guacFrame" style="display:none;"></iframe>
                </div>
            </section>
        </div>
    </div>
</div>

<script>
    let lastDeployResult = null;

    function buildGuacClientIdentifier(connectionId, dataSource = "mysql") {
        const raw = `${connectionId}\0c\0${dataSource}`;
        return btoa(raw).replace(/=+$/, "");
    }

    function buildGuacUrl(connectionId, dataSource = "mysql") {
        const identifier = buildGuacClientIdentifier(connectionId, dataSource);
        return `http://10.30.10.70:8080/guacamole/#/client/${identifier}`;
    }

    function setResult(data) {
        document.getElementById("result").textContent =
            typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    async function deployVm() {
        const body = {
            vmName: document.getElementById("vmName").value,
            osType: document.getElementById("osType").value,
            templateName: document.getElementById("templateName").value,
            cpu: Number(document.getElementById("cpu").value),
            memoryMb: Number(document.getElementById("memoryMb").value),
            networkName: document.getElementById("networkName").value,
            hostName: document.getElementById("hostName").value,
            ipAddress: document.getElementById("ipAddress").value,
            subnetMask: document.getElementById("subnetMask").value,
            gateway: document.getElementById("gateway").value,
            dnsServer: document.getElementById("dnsServer").value,
            powerOn: document.getElementById("powerOn").value === "true"
        };

        try {
            setResult("배포 요청 중입니다...");

            const response = await fetch("/api/vcenter/deploy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            const data = await response.json();
            lastDeployResult = data;
            setResult(data);
        } catch (error) {
            setResult({
                success: false,
                message: "배포 요청 중 오류가 발생했습니다.",
                error: error.message
            });
        }
    }

    async function openRemoteConsole() {
        const body = {
            vmName: document.getElementById("vmName").value,
            osType: document.getElementById("osType").value,
            ipAddress: document.getElementById("ipAddress").value,
            username: "fisa",
            password: "VMware1!"
        };

        try {
            setResult("Guacamole 연결 생성 중입니다...");

            const response = await fetch("/api/guacamole/open", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            const data = await response.json();
            setResult(data);

            if (!data.success) {
                alert("Guacamole 연결 생성 실패");
                return;
            }

            const connectionId = data.guacConnectionId || data.connectionId;
            if (!connectionId) {
                alert("connectionId가 없습니다.");
                return;
            }

            const guacUrl = buildGuacUrl(connectionId, "mysql");

            const frame = document.getElementById("guacFrame");
            const emptyState = document.getElementById("emptyState");

            emptyState.style.display = "none";
            frame.style.display = "block";
            frame.src = guacUrl;
        } catch (error) {
            setResult({
                success: false,
                message: "원격 화면 연결 중 오류가 발생했습니다.",
                error: error.message
            });
        }
    }
</script>
</body>
</html>
